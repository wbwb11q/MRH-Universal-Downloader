name: MRH Universal Downloader

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  download:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      
    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        
    - name: Install yt-dlp
      run: |
        pip install --upgrade yt-dlp
        yt-dlp --version
        
    - name: Create folders
      run: |
        mkdir -p downloads/youtube
        mkdir -p downloads/instagram
        mkdir -p downloads/github
        mkdir -p downloads/direct
        mkdir -p logs
        
    - name: Get commit message
      id: msg
      run: |
        MSG=$(git log -1 --pretty=%B)
        echo "full=$MSG" >> $GITHUB_OUTPUT
        echo "📝 Commit: $MSG"
        
    # ============================================
    # YOUTUBE DOWNLOAD (با هدر واقعی مرورگر)
    # ============================================
    - name: Download from YouTube
      if: contains(steps.msg.outputs.full, 'dl-yt:')
      run: |
        URL=$(echo "${{ steps.msg.outputs.full }}" | grep -oP 'dl-yt:\s*\Khttps?://[^\s]+' | head -1)
        echo "🎬 YouTube: $URL"
        
        cd downloads/youtube
        
        if [[ "${{ steps.msg.outputs.full }}" == *"(mp3)"* ]]; then
          echo "🎵 Downloading audio only..."
          yt-dlp --user-agent "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36" \
                 -x --audio-format mp3 --audio-quality 0 --retries 5 --no-playlist "$URL"
        else
          echo "🎥 Downloading video..."
          yt-dlp --user-agent "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36" \
                 -f bestvideo[height<=720]+bestaudio/best[height<=720] \
                 --merge-output-format mp4 --retries 5 --no-playlist "$URL"
        fi
        
        cd ../..
        echo "✅ YouTube download completed"
        
    # ============================================
    # INSTAGRAM DOWNLOAD (با تاخیر بین درخواست‌ها)
    # ============================================
    - name: Download from Instagram
      if: contains(steps.msg.outputs.full, 'dl-ig:')
      run: |
        URL=$(echo "${{ steps.msg.outputs.full }}" | grep -oP 'dl-ig:\s*\Khttps?://[^\s]+' | head -1)
        echo "📸 Instagram: $URL"
        
        cd downloads/instagram
        yt-dlp --sleep-requests 2 --no-playlist "$URL"
        cd ../..
        echo "✅ Instagram download completed"
        
    # ============================================
    # GITHUB DOWNLOAD
    # ============================================
    - name: Download from GitHub
      if: contains(steps.msg.outputs.full, 'dl-gh:')
      run: |
        URL=$(echo "${{ steps.msg.outputs.full }}" | grep -oP 'dl-gh:\s*\Khttps?://[^\s]+' | head -1)
        echo "🐙 GitHub: $URL"
        
        cd downloads/github
        curl -L -O --retry 5 --retry-delay 2 "$URL"
        cd ../..
        echo "✅ GitHub download completed"
        
    # ============================================
    # DIRECT LINK DOWNLOAD (با تلاش مجدد و بررسی موفقیت)
    # ============================================
    - name: Download direct link
      if: contains(steps.msg.outputs.full, 'dl:') && !contains(steps.msg.outputs.full, 'dl-yt:') && !contains(steps.msg.outputs.full, 'dl-ig:') && !contains(steps.msg.outputs.full, 'dl-gh:')
      run: |
        URLS=$(echo "${{ steps.msg.outputs.full }}" | grep -oP 'dl:\s*\K.*')
        
        cd downloads/direct
        
        for URL in $URLS; do
          FILENAME=$(basename "$URL" | cut -d '?' -f1)
          [ -z "$FILENAME" ] && FILENAME="file_$(date +%H%M%S)"
          echo "⬇️ Downloading: $FILENAME from $URL"
          
          # دانلود با تلاش مجدد و بررسی موفقیت
          if curl -L -o "$FILENAME" --retry 5 --retry-delay 2 --retry-max-time 120 --connect-timeout 30 "$URL"; then
            FILE_SIZE=$(du -h "$FILENAME" | cut -f1)
            echo "✅ Success: $FILENAME ($FILE_SIZE)"
          else
            echo "❌ Failed: $URL"
            # ذخیره لینک خراب برای گزارش
            echo "$URL" >> ../../logs/failed_links.txt
            exit 1
          fi
        done
        
        cd ../..
        echo "✅ Direct downloads completed"
        
    # ============================================
    # STOP COMMAND
    # ============================================
    - name: Stop command
      if: contains(steps.msg.outputs.full, 'dl-stop')
      run: |
        echo "🛑 Emergency stop activated"
        exit 0
        
    # ============================================
    # نمایش نتایج (با جزئیات بیشتر)
    # ============================================
    - name: Show results
      run: |
        echo ""
        echo "=========================================="
        echo "📁 DOWNLOADED FILES:"
        echo "=========================================="
        if [ -d downloads ] && [ "$(ls -A downloads 2>/dev/null)" ]; then
          find downloads -type f -exec ls -lh {} \;
          echo ""
          echo "📊 Total size: $(du -sh downloads | cut -f1)"
        else
          echo "⚠️ No files found in downloads folder"
          echo "📂 Directory structure:"
          ls -la downloads/ 2>/dev/null || echo "downloads folder is empty or doesn't exist"
        fi
        echo "=========================================="
        
    # ============================================
    # ذخیره لاگ خطا (اگر دانلود失敗 شد)
    # ============================================
    - name: Save error log on failure
      if: failure()
      run: |
        echo "=========================================="
        echo "❌ DOWNLOAD FAILED - Saving error log"
        echo "=========================================="
        echo "Commit: ${{ steps.msg.outputs.full }}" > logs/error_$(date +%Y%m%d_%H%M%S).log
        echo "Time: $(date)" >> logs/error_$(date +%Y%m%d_%H%M%S).log
        echo "Failed at: $(pwd)" >> logs/error_$(date +%Y%m%d_%H%M%S).log
        
    # ============================================
    # COMMIT FILES
    # ============================================
    - name: Commit files
      run: |
        git config user.name "MRH Downloader"
        git config user.email "mrh@downloader.local"
        git add downloads/ logs/ || true
        git diff --staged --quiet || git commit -m "MRH: Downloads completed [skip ci]"
        git push || true
