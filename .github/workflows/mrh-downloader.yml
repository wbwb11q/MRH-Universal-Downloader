name: MRH Universal Downloader

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  download:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    
    steps:
    - name: Checkout
      uses: actions/checkout@v4
      
    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        
    - name: Install yt-dlp (for Instagram)
      run: |
        pip install yt-dlp
        
    - name: Create folders
      run: |
        mkdir -p downloads/instagram
        mkdir -p downloads/github
        mkdir -p downloads/direct
        
    - name: Get commit message
      id: msg
      run: |
        MSG=$(git log -1 --pretty=%B)
        echo "full=$MSG" >> $GITHUB_OUTPUT
        echo "📝 Commit: $MSG"
        
    # ============================================
    # 1. INSTAGRAM
    # ============================================
    - name: Download from Instagram
      if: contains(steps.msg.outputs.full, 'dl-ig:')
      run: |
        URL=$(echo "${{ steps.msg.outputs.full }}" | grep -o 'dl-ig: [^ ]*' | cut -d' ' -f2)
        echo "📸 Instagram: $URL"
        cd downloads/instagram
        yt-dlp --no-playlist "$URL" --retries 5
        cd ../..
        echo "✅ Instagram done"
        
    # ============================================
    # 2. GITHUB RELEASE
    # ============================================
    - name: Download from GitHub
      if: contains(steps.msg.outputs.full, 'dl-gh:')
      run: |
        URL=$(echo "${{ steps.msg.outputs.full }}" | grep -o 'dl-gh: [^ ]*' | cut -d' ' -f2)
        echo "🐙 GitHub: $URL"
        mkdir -p downloads/github
        cd downloads/github
        curl -L -O --retry 5 --retry-delay 2 --max-time 600 --keepalive-time 60 --continue-at - "$URL"
        cd ../..
        echo "✅ GitHub done"
        
    # ============================================
    # 3. DIRECT LINK (با تشخیص خودکار حجم و فشرده‌سازی برای فایل‌های بالای 95 مگ)
    # ============================================
    - name: Download direct link
      if: contains(steps.msg.outputs.full, 'dl:') && !contains(steps.msg.outputs.full, 'dl-ig:') && !contains(steps.msg.outputs.full, 'dl-gh:')
      run: |
        URL=$(echo "${{ steps.msg.outputs.full }}" | grep -o 'dl: [^ ]*' | cut -d' ' -f2)
        echo "📁 Direct: $URL"
        
        FILENAME=$(basename "$URL" | cut -d '?' -f1)
        [ -z "$FILENAME" ] && FILENAME="file_$(date +%H%M%S)"
        
        mkdir -p downloads/direct
        
        echo "⬇️ Downloading $FILENAME ..."
        curl -L -o "downloads/direct/$FILENAME" --retry 5 --retry-delay 2 --max-time 600 --keepalive-time 60 "$URL"
        
        if [ ! -f "downloads/direct/$FILENAME" ]; then
          echo "❌ Download failed"
          exit 1
        fi
        
        # گرفتن حجم فایل بر حسب مگابایت
        if command -v stat &> /dev/null; then
          FILE_SIZE_BYTES=$(stat -c%s "downloads/direct/$FILENAME" 2>/dev/null || stat -f%z "downloads/direct/$FILENAME" 2>/dev/null)
          FILE_SIZE_MB=$((FILE_SIZE_BYTES / 1024 / 1024))
          echo "📊 File size: ${FILE_SIZE_MB} MB"
          
          # اگر حجم فایل بیشتر از 95 مگابایت بود، آن را تکه تکه و زیپ کن
          if [ $FILE_SIZE_MB -ge 95 ]; then
            echo "⚙️ File is ≥95 MB. Splitting and compressing..."
            
            cd downloads/direct
            
            # تکه تکه کردن فایل به قطعات 95 مگابایتی
            split -b $((95 * 1024 * 1024)) "$FILENAME" "${FILENAME}.part."
            
            # زیپ کردن قطعات
            zip "${FILENAME}.zip" "${FILENAME}.part."* > /dev/null 2>&1
            
            # حذف فایل اصلی و قطعات
            rm -f "$FILENAME"
            rm -f "${FILENAME}.part."*
            
            cd ../..
            echo "✅ File compressed to ${FILENAME}.zip"
          else
            echo "✅ File size <95 MB, saved directly"
          fi
        else
          echo "⚠️ Could not determine file size, saved as is"
        fi
        
        echo "✅ Direct download processed"
        
    # ============================================
    # 4. STOP COMMAND
    # ============================================
    - name: Stop command
      if: contains(steps.msg.outputs.full, 'dl-stop')
      run: |
        echo "🛑 Emergency stop activated"
        exit 0
        
    # ============================================
    # 5. SHOW RESULTS
    # ============================================
    - name: Show results
      run: |
        echo ""
        echo "=========================================="
        echo "📁 DOWNLOADED FILES:"
        echo "=========================================="
        if [ -d downloads ] && [ "$(ls -A downloads 2>/dev/null)" ]; then
          find downloads -type f -exec ls -lh {} \;
          echo ""
          echo "📊 Total size: $(du -sh downloads | cut -f1)"
        else
          echo "⚠️ No files found in downloads folder"
        fi
        echo "=========================================="
        
    # ============================================
    # 6. COMMIT FILES
    # ============================================
    - name: Commit files
      run: |
        git config user.name "MRH Bot"
        git config user.email "bot@localhost"
        git add downloads/ || true
        git diff --staged --quiet || git commit -m "MRH: Downloads [skip ci]"
        git push || true
