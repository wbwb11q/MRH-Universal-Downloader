name: MRH Universal Downloader v2.0

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  download:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    
    steps:
    - name: Checkout
      uses: actions/checkout@v4
      
    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        
    - name: Install yt-dlp with full features
      uses: AnimMouse/setup-yt-dlp@v3
      with:
        aria2: true
        ejs-node: true
        ffmpeg: true
        
    - name: Create folders
      run: |
        mkdir -p downloads/youtube
        mkdir -p downloads/instagram
        mkdir -p downloads/github
        mkdir -p downloads/direct
        
    - name: Get commit message
      id: msg
      run: |
        MSG=$(git log -1 --pretty=%B)
        echo "full=$MSG" >> $GITHUB_OUTPUT
        echo "📝 Commit: $MSG"
        
    # ============================================
    # 1. YOUTUBE (با جدیدترین روش)
    # ============================================
    - name: Download from YouTube
      if: contains(steps.msg.outputs.full, 'dl-yt:')
      run: |
        URL=$(echo "${{ steps.msg.outputs.full }}" | grep -oP 'dl-yt:\s*\Khttps?://[^\s]+' | head -1)
        URL=$(echo "$URL" | sed 's/(mp3)//g' | sed 's/(mp4)//g' | xargs)
        echo "🎬 YouTube: $URL"
        
        cd downloads/youtube
        
        if [[ "${{ steps.msg.outputs.full }}" == *"(mp3)"* ]]; then
          echo "🎵 Downloading audio..."
          yt-dlp -x --audio-format mp3 --audio-quality 2 --no-playlist --retries 5 \
            --extractor-args "youtube:player-client=default,tv" \
            "$URL"
        else
          echo "🎥 Downloading video..."
          yt-dlp -f "worst[ext=mp4]" --no-playlist --retries 5 \
            --extractor-args "youtube:player-client=default,tv" \
            "$URL"
        fi
        
        cd ../..
        echo "✅ YouTube done"
        
    # ============================================
    # 2. INSTAGRAM
    # ============================================
    - name: Download from Instagram
      if: contains(steps.msg.outputs.full, 'dl-ig:')
      run: |
        URL=$(echo "${{ steps.msg.outputs.full }}" | grep -oP 'dl-ig:\s*\Khttps?://[^\s]+' | head -1)
        echo "📸 Instagram: $URL"
        
        cd downloads/instagram
        yt-dlp --no-playlist --retries 5 "$URL"
        cd ../..
        echo "✅ Instagram done"
        
    # ============================================
    # 3. GITHUB RELEASE
    # ============================================
    - name: Download from GitHub
      if: contains(steps.msg.outputs.full, 'dl-gh:')
      run: |
        URL=$(echo "${{ steps.msg.outputs.full }}" | grep -oP 'dl-gh:\s*\Khttps?://[^\s]+' | head -1)
        echo "🐙 GitHub: $URL"
        
        cd downloads/github
        curl -L -O --retry 5 --retry-delay 2 --fail-with-body "$URL"
        cd ../..
        echo "✅ GitHub done"
        
    # ============================================
    # 4. DIRECT LINK
    # ============================================
    - name: Download direct link
      if: contains(steps.msg.outputs.full, 'dl:') && !contains(steps.msg.outputs.full, 'dl-yt:') && !contains(steps.msg.outputs.full, 'dl-ig:') && !contains(steps.msg.outputs.full, 'dl-gh:')
      run: |
        URL=$(echo "${{ steps.msg.outputs.full }}" | grep -oP 'dl:\s*\Khttps?://[^\s]+' | head -1)
        echo "📁 Direct: $URL"
        
        cd downloads/direct
        FILENAME=$(basename "$URL" | cut -d '?' -f1)
        [ -z "$FILENAME" ] && FILENAME="file_$(date +%H%M%S)"
        
        curl -L -o "$FILENAME" --retry 5 --retry-delay 2 --connect-timeout 30 --fail-with-body "$URL"
        cd ../..
        echo "✅ Direct done"
        
    # ============================================
    # 5. STOP
    # ============================================
    - name: Stop command
      if: contains(steps.msg.outputs.full, 'dl-stop')
      run: |
        echo "🛑 Emergency stop"
        exit 0
        
    # ============================================
    # 6. گام مهم: نمایش و Commit فایل‌ها
    # ============================================
    - name: List downloaded files
      run: |
        echo ""
        echo "=========================================="
        echo "📁 DOWNLOADED FILES:"
        echo "=========================================="
        if [ -d downloads ] && [ "$(ls -A downloads 2>/dev/null)" ]; then
          find downloads -type f -exec ls -lh {} \;
          echo ""
          echo "📊 Total size: $(du -sh downloads | cut -f1)"
        else
          echo "⚠️ No files found in downloads folder"
        fi
        echo "=========================================="
        
    # ============================================
    # 7. Commit و Push (مهم!)
    # ============================================
    - name: Commit and push files
      run: |
        git config user.name "MRH Downloader Bot"
        git config user.email "mrh-bot@downloader.local"
        
        # بررسی وجود فایل‌ها
        if [ -d downloads ] && [ "$(ls -A downloads 2>/dev/null)" ]; then
          git add downloads/
          git commit -m "MRH: Add downloaded files [skip ci]" || echo "No changes to commit"
          git push
          echo "✅ Files committed and pushed to repository"
        else
          echo "⚠️ No files to commit"
        fi
