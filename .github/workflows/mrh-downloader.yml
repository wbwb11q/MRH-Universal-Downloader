name: MRH Universal Downloader

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  download:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    
    steps:
    - name: Checkout
      uses: actions/checkout@v4
      
    - name: Setup yt-dlp with full options
      uses: AnimMouse/setup-yt-dlp@v3
      with:
        aria2: true          # فعال کردن دانلود چندبخشی برای سرعت
        ejs-node: true       # پردازش چالش جاوااسکریپت یوتیوب (حل مشکل)
        ffmpeg: true         # نصب FFmpeg برای ادغام صدا و تصویر
      
    - name: Create directories
      run: |
        mkdir -p downloads/youtube
        mkdir -p downloads/instagram
        mkdir -p downloads/github
        mkdir -p downloads/direct
        
    - name: Get commit message
      id: msg
      run: |
        MSG=$(git log -1 --pretty=%B)
        echo "full=$MSG" >> $GITHUB_OUTPUT
        echo "📝 Commit: $MSG"
        
    - name: Download from YouTube
      if: contains(steps.msg.outputs.full, 'dl-yt:')
      run: |
        URL=$(echo "${{ steps.msg.outputs.full }}" | grep -oP 'dl-yt:\s*\Khttps?://[^\s]+' | head -1)
        echo "🎬 YouTube: $URL"
        cd downloads/youtube
        
        if [[ "${{ steps.msg.outputs.full }}" == *"(mp3)"* ]]; then
          echo "🎵 Downloading audio..."
          yt-dlp -x --audio-format mp3 --audio-quality 0 \
                 --add-header "User-Agent: Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36" \
                 --retries 5 --fragment-retries 5 --sleep-requests 2 \
                 "$URL"
        else
          echo "🎥 Downloading video..."
          yt-dlp -f "bestvideo[height<=720][ext=mp4]+bestaudio[ext=m4a]/best[height<=720]" \
                 --merge-output-format mp4 \
                 --add-header "User-Agent: Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36" \
                 --retries 5 --fragment-retries 5 --sleep-requests 2 \
                 "$URL"
        fi
        cd ../..
        
    - name: Download from Instagram
      if: contains(steps.msg.outputs.full, 'dl-ig:')
      run: |
        URL=$(echo "${{ steps.msg.outputs.full }}" | grep -oP 'dl-ig:\s*\Khttps?://[^\s]+' | head -1)
        echo "📸 Instagram: $URL"
        cd downloads/instagram
        yt-dlp --no-playlist "$URL"
        cd ../..
        
    - name: Download from GitHub
      if: contains(steps.msg.outputs.full, 'dl-gh:')
      run: |
        URL=$(echo "${{ steps.msg.outputs.full }}" | grep -oP 'dl-gh:\s*\Khttps?://[^\s]+' | head -1)
        echo "🐙 GitHub: $URL"
        cd downloads/github
        curl -L -O "$URL"
        cd ../..
        
    - name: Download direct links
      if: contains(steps.msg.outputs.full, 'dl:') && !contains(steps.msg.outputs.full, 'dl-yt:') && !contains(steps.msg.outputs.full, 'dl-ig:') && !contains(steps.msg.outputs.full, 'dl-gh:')
      run: |
        URLS=$(echo "${{ steps.msg.outputs.full }}" | sed 's/^dl: //')
        cd downloads/direct
        for URL in $URLS; do
          FILENAME=$(basename "$URL" | cut -d '?' -f1)
          [ -z "$FILENAME" ] && FILENAME="file_$(date +%H%M%S)"
          echo "⬇️ $FILENAME"
          curl -L -o "$FILENAME" "$URL"
        done
        cd ../..
        
    - name: Stop command
      if: contains(steps.msg.outputs.full, 'dl-stop')
      run: |
        echo "🛑 Stopped"
        exit 0
        
    - name: Show results
      run: |
        echo ""
        echo "=== 📁 DOWNLOADED FILES ==="
        find downloads -type f -exec ls -lh {} \; 2>/dev/null || echo "No files"
        
    - name: Commit files
      run: |
        git config user.name "MRH Bot"
        git config user.email "bot@local"
        git add downloads/ || true
        git diff --staged --quiet || git commit -m "MRH: Downloads [skip ci]"
        git push || true
